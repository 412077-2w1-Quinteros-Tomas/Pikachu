<article
  class="card"
  [class.card--selected]="selected()"
  [class.card--compact]="compact()"
  [attr.data-type]="card().cardType"
  (click)="onCardClick()"
  (keydown.enter)="onCardClick()"
  tabindex="0"
  role="button"
  [attr.aria-label]="card().name"
  [style.--accent]="getPrimaryTypeColor()"
>
  <!-- Art layer -->
  <div class="card__art">
    @if (card().imageUrl) {
      <img class="card__img" [src]="card().imageUrl" [alt]="card().name" loading="lazy" />
    } @else {
      <div class="card__placeholder">
        <span class="card__placeholder-letter">{{ card().name[0] }}</span>
      </div>
    }
  </div>

  <!-- Holographic foil layer (responds to --hx / --hy) -->
  <div class="card__holo" aria-hidden="true"></div>

  <!-- Glare/specular highlight (responds to --mx / --my) -->
  <div class="card__shine" aria-hidden="true"></div>

  <!-- Border glow ring -->
  <div class="card__glow-ring" aria-hidden="true"></div>

  <!-- Info overlay (compact: just rarity dots; full: name + meta) -->
  @if (!compact()) {
    <div class="card__overlay">
      @if (getRarityStars()) {
        <span class="card__rarity">{{ getRarityStars() }}</span>
      }
      <div class="card__name">{{ card().name }}</div>
      <div class="card__meta">
        @if (card().hp) {
          <span class="card__hp">{{ card().hp }}<small>HP</small></span>
        }
        @for (type of (card().types ?? []); track type) {
          <span class="card__type-pip" [style.background]="getEnergyColor(type)"></span>
        }
        @if (card().stage) {
          <span class="card__stage-tag">{{ card().stage }}</span>
        }
      </div>
    </div>
  }
</article>
