<div class="game-page">
  <header class="game-header">
    <a routerLink="/lobby" class="back-link">← Lobby</a>
    <span class="match-info">Partida: {{ matchId }}</span>
    @if (gameState.phase()) {
      <span class="phase-badge">{{ gameState.phase() }}</span>
    }
  </header>

  <app-game-board [matchId]="matchId" [playerId]="playerId" />
</div>
