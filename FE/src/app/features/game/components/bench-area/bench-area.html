<div class="bench">
  <span class="bench__label">Banca</span>
  <div class="bench__slots">
    @for (slot of [0,1,2,3,4]; track slot) {
      <div class="bench__slot"
           [class.bench__slot--target]="energyTargetMode() && !!bench()[slot]"
           (click)="energyTargetMode() && bench()[slot] && benchSelected.emit(slot)">
        @if (bench()[slot]) {
          <div class="bench-mini">
            @if (bench()[slot].pokemon.imageUrl) {
              <img class="bench-mini__img" [src]="bench()[slot].pokemon.imageUrl" [alt]="bench()[slot].pokemon.name" />
            } @else {
              <span class="bench-mini__noimg">🎴</span>
            }
            <div class="bench-mini__name">{{ bench()[slot].pokemon.name }}</div>
            <div class="bench-mini__hpbar">
              <div class="bench-mini__hpfill" [style.width.%]="hpPercent(bench()[slot])" [style.background]="hpColor(bench()[slot])"></div>
            </div>
            @if (energyTargetMode()) {
              <div class="bench-mini__target-icon">⚡</div>
            }
          </div>
        } @else {
          <div class="bench-mini bench-mini--empty">·</div>
        }
      </div>
    }
  </div>
</div>
