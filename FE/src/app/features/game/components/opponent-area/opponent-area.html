<div class="opponent-area">
  <div class="opponent-area__header">
    <span class="opponent-label">Oponente: {{ board()?.playerId }}</span>
    <div class="opponent-area__stats">
      <app-prize-cards [prizes]="board()?.prizeCards ?? []" [isOpponent]="true" />
      <app-deck-pile [count]="board()?.deck?.length ?? 0" />
      <app-discard-pile [count]="board()?.discardPile?.length ?? 0" />
      <span class="hand-count">Mano: {{ board()?.hand?.length ?? 0 }}</span>
    </div>
  </div>
  <div class="opponent-area__field">
    <app-bench-area [bench]="board()?.bench ?? []" />
    <app-active-pokemon [pokemon]="board()?.activePokemon ?? null" label="Activo (Oponente)" />
  </div>
</div>
